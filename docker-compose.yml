services:
  app:
    build:
      context: .
      args:
        # Variables publiques inlinées au build (voir Dockerfile).
        # Renseignées depuis le .env à côté de ce compose (ou l'environnement du shell).
        NEXT_PUBLIC_TRADE_URL: ${NEXT_PUBLIC_TRADE_URL}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    container_name: klarte-vie-web
    restart: unless-stopped
    # Exposé seulement en local : Nginx (sur l'hôte) reverse-proxie vers ce port.
    ports:
      - "127.0.0.1:3031:3031"
    # Secrets serveur (ANTHROPIC_API_KEY, RECIPE_AI_*, DATABASE_URL) au runtime.
    env_file:
      - .env
    depends_on:
      - db

  # ── Base de données (recettes) : Postgres auto-hébergé ──────────────────────
  db:
    image: postgres:16-alpine
    container_name: klarte-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: klarte
      POSTGRES_DB: klarte
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Pas de port public : joignable seulement par l'app (postgres://…@db:5432).
    volumes:
      - db-data:/var/lib/postgresql/data

  # ── LLM local (optionnel) : reformatage des recettes sans API Claude ────────
  # Ne démarre QU'AVEC le profil dédié — le déploiement normal est inchangé :
  #   docker compose --profile ollama up -d --build
  # puis (une fois) : docker exec klarte-ollama ollama pull qwen2.5:3b
  ollama:
    image: ollama/ollama:latest
    container_name: klarte-ollama
    restart: unless-stopped
    profiles: ["ollama"]
    environment:
      # Garde le modèle chargé en permanence (-1) → plus de rechargement lent à
      # chaque usage. Il occupe ~4 Go en continu (borné par mem_limit ci-dessous).
      # Si la RAM devient tendue, repasser à "30m" (déchargé après inactivité).
      OLLAMA_KEEP_ALIVE: "-1"
    # Pas de port public : joignable seulement par l'app via le réseau Docker
    # (http://ollama:11434).
    expose:
      - "11434"
    volumes:
      - ollama-models:/root/.ollama
    # Garde-fou mémoire : le VPS n'a pas de swap, on borne Ollama pour ne jamais
    # menacer les autres conteneurs. Un modèle 3B tient largement sous cette limite.
    mem_limit: 5g
    # Réserve 1 cœur (sur 4) au site + la base : pendant la génération (CPU à
    # fond), l'app reste réactive. Génération un peu plus lente, mais pas de gel.
    cpus: 3.0

volumes:
  db-data:
  ollama-models:
