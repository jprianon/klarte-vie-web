# /etc/nginx/sites-available/vie.klarte.re
# Reverse proxy → conteneur klarte-vie-web (127.0.0.1:3031).
# Après avoir posé ce fichier : certbot --nginx -d vie.klarte.re  (ajoute le bloc TLS 443).

server {
    listen 80;
    listen [::]:80;
    server_name vie.klarte.re;

    # Taille des uploads (photos de recettes, etc.).
    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:3031;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / streaming (utile pour les routes serveur Next).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}
