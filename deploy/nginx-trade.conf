# /etc/nginx/sites-available/trade.klarte.re
# Reverse proxy → conteneur klarte-trade (127.0.0.1:3002).
# Après avoir posé ce fichier : certbot --nginx -d trade.klarte.re  (ajoute le bloc TLS 443).

server {
    listen 80;
    listen [::]:80;
    server_name trade.klarte.re;

    # Screenshots de positions uploadés par l'app trade.
    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}
